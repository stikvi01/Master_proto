<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symptom page</title>
    <link href="../styles.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <div class="filter-buttons">
        <button onclick="filterCards('')">Vis alle</button>
        <button onclick="filterCards('lindrende behandling')">Lindrende behandling</button>
        <button onclick="filterCards('immunterapi')">Immunterapi</button>
        <button onclick="filterCards('stråle behandling')">Stråle behandling</button>
        <button onclick="filterCards('goal')">Målrettet behandling</button>
    </div>
    <div class="card-container">
        <div id="btnPall" class="card" data-name="lindrende behandling">
            <img src="../img/Untitled_Artwork 27.jpg" alt="Card image">
            <div class="card-content">
                <h3 class="card-title">Lindrende behandling</h3>
            </div>
        </div>
        <div id="btnImune" class="card" data-name="immunterapi">
            <img src="../img/Untitled_Artwork 27.jpg" alt="Card image">
            <div class="card-content">
                <h3 class="card-title">Immunterapi</h3>
            </div>
        </div>
        <div id="btnRadi" class="card" data-name="stråle behandling">
            <img src="../img/Untitled_Artwork 27.jpg" alt="Card image">
            <div class="card-content">
                <h3 class="card-title">Stråle behandling</h3>
            </div>
        </div>
        <div id="btnSurg" class="card" data-name="goal">
            <img src="../img/Untitled_Artwork 27.jpg" alt="Card image">
            <div class="card-content">
                <h3 class="card-title">Målrettet behandling</h3>
            </div>
        </div>
    </div>
    <div class="nav-bar">
        <div id="btnHome" class="navCard"><i class="fa fa-home" aria-hidden="true"></i></div>
        <div id="btnCalender" class="navCard"><i class="fa fa-calendar" aria-hidden="true"></i></div>
        <div id="btnInbox" class="navCard"><i class="fa fa-commenting" aria-hidden="true"></i></div>
        <div id="btnProfile" class="navCard"><i class="fa fa-user" aria-hidden="true"></i></div>
    </div>
    <script>
        const btnHome = document.getElementById("btnHome");
        const btnCalender = document.getElementById("btnCalender");
        const btnInbox = document.getElementById("btnInbox");
        const btnProfile = document.getElementById("btnProfile")
        const btnImune = document.getElementById("btnImune");
        const btnRadi = document.getElementById("btnRadi");
        const btnPall = document.getElementById("btnPall");
        const btnSurg = document.getElementById("btnSurg");
        const cards = document.querySelectorAll(".card");
        let savedFilter = localStorage.getItem('selectedFilter') || '';
        filterCards(savedFilter);

        btnHome.addEventListener("click", () => {
            window.location.href = "index.html"
        });

        btnCalender.addEventListener("click", () => {
            window.location.href = "calender.html"
        });

        btnInbox.addEventListener("click", () => {
            window.location.href = "inbox.html"
        });

        btnProfile.addEventListener("click", () => {
            window.location.href = "profile.html"
        });

        btnPall.addEventListener("click", () => {
            window.location.href = "palliative.html"
        });

        btnImune.addEventListener("click", () => {
            window.location.href = "immune.html"
        });

        btnRadi.addEventListener("click", () => {
            window.location.href = "radiation.html"
        });

        btnSurg.addEventListener("click", () => {
            window.location.href = "goal.html"
        });





        function filterCards(type) {
            cards.forEach(card => {
                const name = card.getAttribute("data-name");
                if (type === "" || name === type) {
                    card.style.display = "block";
                }
                else {
                    card.style.display = "none";
                }
                localStorage.setItem('selectedFilter', type);

            });
            savedFilter = localStorage.getItem('selectedFilter') || '';
            return savedFilter
        };
        
    </script>
</body>

</html>
