<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../styles.css" rel="stylesheet">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Cancer care prototype</title>
</head>

<body>
    <div style="height: 200px;">
        <h1>Velkomen tilbake</h1>
    </div>

    <div>
        <div class="grid-container">
            <div id="sympbtn" class="indexCard">Bivirkninger</div>
            <div id="treatbtn" class="indexCard">Behandling</div>
            <div id="impbtn" class="indexCard">Viktig info</div>
            <div id="calbtn" class="indexCard">Neste time</div>
            <div id="resbtn" class="indexCard">Ressurser</div>
            <div id="plussbtn" class="indexCard">+</div>
        </div>
    </div>
    <div class="nav-bar">
        <div id="btnHome" class="navCard"><i class="fa fa-home" aria-hidden="true"></i></div>
        <div id="btnCalender" class="navCard"><i class="fa fa-calendar" aria-hidden="true"></i></div>
        <div id="btnInbox" class="navCard"><i class="fa fa-commenting" aria-hidden="true"></i></div>
        <div id="btnProfile" class="navCard"><i class="fa fa-user" aria-hidden="true"></i></div>
    </div>

    <script>
        const sympbtn = document.getElementById("sympbtn")
        const treatbtn = document.getElementById("treatbtn")
        const impbtn = document.getElementById("impbtn")
        const calbtn = document.getElementById("calbtn")
        const resbtn = document.getElementById("resbtn")

        const btnHome = document.getElementById("btnHome");
        const btnCalender = document.getElementById("btnCalender");
        const btnInbox = document.getElementById("btnInbox");
        const btnProfile = document.getElementById("btnProfile")

        sympbtn.addEventListener("click", () => {
            window.location.href = "symptoms.html"
        });

        treatbtn.addEventListener("click", () => {
            window.location.href = "treatmentNav.html"
        });

        impbtn.addEventListener("click", () => {
            window.location.href = "important.html"
        });

        calbtn.addEventListener("click", () => {
            window.location.href = "nextApt.html"
        });

        resbtn.addEventListener("click", () => {
            window.location.href = "resources.html"
        });

         btnHome.addEventListener("click", () => {
            window.location.href = "index.html"
        });

         btnCalender.addEventListener("click", () => {
            window.location.href = "calender.html"
        });

         btnInbox.addEventListener("click", () => {
            window.location.href = "inbox.html"
        });

         btnProfile.addEventListener("click", () => {
            window.location.href = "profile.html"
        });


    </script>
</body>


</html>
