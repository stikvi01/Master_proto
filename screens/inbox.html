<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox page</title>
    <link href="../styles.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body style="background-color: #e5ddc8;">
    <h1>Innboks</h1>
    <div>
        <div class="grid-container-3">
            <div id="DrHansen" class="indexCard3">
                <img class="imgInbox" src="../img/profile-01.png" alt="">
                <h2>Dr. Hansen</h2>
            </div>
            <div id="Turid" class="indexCard3">
                <img class="imgInbox" src="../img/profile-02.png" alt="">

                <h2>Turid</h2>
            </div>
            <div id="Kåre" class="indexCard3">
                <img class="imgInbox" src="../img/profile-03.png" alt="">

                <h2>Kåre</h2>
            </div>
            <div id="DrArne" class="indexCard3">
                <img class="imgInbox" src="../img/profile-04.png" alt="">

                <h2>Dr. Arne</h2>
            </div>
        </div>
    </div>
    <br><br><br>
    <div class="nav-bar">
        <div id="btnHome" class="navCard"><i class="fa fa-home" aria-hidden="true"></i></div>
        <div id="btnCalender" class="navCard"><i class="fa fa-calendar" aria-hidden="true"></i></div>
        <div id="btnInbox" class="navCard"><i class="fa fa-commenting" aria-hidden="true"></i></div>
        <div id="btnProfile" class="navCard"><i class="fa fa-user" aria-hidden="true"></i></div>
    </div>

</body>
<script>
    const btnHome = document.getElementById("btnHome");
    const btnCalender = document.getElementById("btnCalender");
    const btnInbox = document.getElementById("btnInbox");
    const btnProfile = document.getElementById("btnProfile");
    const DrHansen = document.getElementById("DrHansen");

    btnHome.addEventListener("click", () => {
        window.location.href = "index.html"
    });

    btnCalender.addEventListener("click", () => {
        window.location.href = "calender.html"
    });

    btnInbox.addEventListener("click", () => {
        window.location.href = "inbox.html"
    });

    btnProfile.addEventListener("click", () => {
        window.location.href = "profile.html"
    });
    DrHansen.addEventListener("click", () => {
        window.location.href = "msg.html"
    });
</script>

</html>
